spring.application.name=ticket-system

# ===== MySQL =====
spring.datasource.url=jdbc:mysql://localhost:3306/ticket_system?useSSL=false&serverTimezone=UTC&characterEncoding=utf-8&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=hanhanzi0210

# ===== MyBatis =====
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.ticket_system.entity
mybatis.configuration.map-underscore-to-camel-case=true

# ===== Redis =====
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=3000ms

# ===== MinIO =====
minio.endpoint=http://localhost:9000
minio.access-key=hanhanzi
minio.secret-key=hanhanzi0210
minio.bucket-name=concert

# ===== RabbitMQ =====
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=hanhanzi
spring.rabbitmq.password=hanhanzi0210
spring.rabbitmq.virtual-host=/
spring.rabbitmq.listener.simple.prefetch=1

# 生产者重试（MQ broker 不可用时重试发送）
spring.rabbitmq.template.retry.enabled=true
spring.rabbitmq.template.retry.max-attempts=3
spring.rabbitmq.template.retry.initial-interval=1000
spring.rabbitmq.template.retry.multiplier=2.0
spring.rabbitmq.template.retry.max-interval=10000

# 消费者重试（业务处理失败时重新消费）
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=2000
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.retry.max-interval=10000

# ===== 支付网关 =====
# 支付渠道：mock(模拟) / wechat(微信) / alipay(支付宝)，切换此值即可换支付平台
pay.channel=mock