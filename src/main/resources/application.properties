spring.application.name=ticket-system

# ===== MySQL =====
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ticket_system?useSSL=false&serverTimezone=UTC&characterEncoding=utf-8&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# ===== MyBatis =====
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.ticket_system.entity
mybatis.configuration.map-underscore-to-camel-case=true

# ===== Redis =====
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=3000ms

# ===== MinIO =====
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:}
minio.secret-key=${MINIO_SECRET_KEY:}
minio.bucket-name=${MINIO_BUCKET:concert}

# ===== RabbitMQ =====
spring.rabbitmq.host=${MQ_HOST:localhost}
spring.rabbitmq.port=${MQ_PORT:5672}
spring.rabbitmq.username=${MQ_USERNAME:}
spring.rabbitmq.password=${MQ_PASSWORD:}
spring.rabbitmq.virtual-host=/
spring.rabbitmq.listener.simple.prefetch=1

# 生产者重试
spring.rabbitmq.template.retry.enabled=true
spring.rabbitmq.template.retry.max-attempts=3
spring.rabbitmq.template.retry.initial-interval=1000
spring.rabbitmq.template.retry.multiplier=2.0
spring.rabbitmq.template.retry.max-interval=10000

# 消费者重试
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=2000
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.retry.max-interval=10000

# ===== 支付网关 =====
pay.channel=${PAY_CHANNEL:mock}
